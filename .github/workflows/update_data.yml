name: Update MTA Fuel Data

on:
  schedule:
    # Runs daily at 20:00 UTC (2:00 PM CST / 3:00 PM CDT) — after MTA email arrives ~1 PM
    - cron: '0 20 * * *'
  workflow_dispatch: # Allows you to trigger it manually via a button in GitHub

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Run Python script to fetch email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python fetch_mta_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/
          # Only commit if the data actually changed
          git commit -m "Automated update of MTA Fuel Data" || exit 0
          git push
