name: Parse Excel to JSON

on:
push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run parser
        run: python .github/scripts/parse_fuel.py

      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-parsed fuel data from Excel"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/MTA-FUEL-1/fuel-dashboardNEW3.git
